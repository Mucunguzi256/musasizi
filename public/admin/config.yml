backend:
  name: git-gateway
  branch: main

logo_url: /images/Hon_Musasiizi.png

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "speeches"
    label: "Speeches"
    folder: "src/content/speeches"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "District", name: "district", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: ["Planning", "Ongoing", "Completed"] }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Gallery"
    folder: "src/content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "datetime", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["Speeches", "Policy", "Economic Updates", "Constituency Projects"] }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Source", name: "source", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }