backend:
  name: git-gateway
  branch: main

logo_url: /images/minister-henry-musasizi.svg

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "speeches"
    label: "Speeches & Statements"
    folder: "src/content/speeches"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Development Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "District", name: "district", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: ["Planning", "Ongoing", "Completed"] }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Photo Gallery"
    folder: "src/content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "datetime", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }
